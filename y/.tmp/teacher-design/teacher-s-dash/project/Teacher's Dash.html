const { useState, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#3b82f6","theme":"dark","compactMode":false}/*EDITMODE-END*/;

const C = {
  bg: '#0d1117', surface: '#161b22', surface2: '#1c2128', surface3: '#21262d',
  border: '#30363d', borderLight: '#21262d',
  text: '#e6edf3', textMuted: '#7d8590', textDim: '#484f58',
  blue: '#3b82f6', cyan: '#22d3ee', green: '#22c55e',
  amber: '#f59e0b', red: '#ef4444', purple: '#a855f7',
};

// ─── Shared primitives ────────────────────────────────────

function Pill({ label, active, onClick, color }) {
  const [hov, setHov] = useState(false);
  const bg = active ? (color || C.blue) : hov ? '#ffffff0a' : 'transparent';
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: bg, color: active ? '#fff' : C.textMuted, border: `1px solid ${active ? (color||C.blue) : C.border}`, borderRadius: 20, padding: '5px 14px', fontSize: 12, fontWeight: active ? 600 : 400, transition: 'all .15s' }}>
      {label}
    </button>
  );
}

function Sel({ value, onChange, options, style }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.textMuted, borderRadius: 8, padding: '7px 12px', fontSize: 12, ...style }}>
      {options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}
    </select>
  );
}

function Btn({ children, variant = 'ghost', color, onClick, style }) {
  const [hov, setHov] = useState(false);
  const base = variant === 'solid'
    ? { background: color || C.blue, color: '#fff', border: 'none' }
    : variant === 'outline'
    ? { background: hov ? '#ffffff08' : 'transparent', color: C.textMuted, border: `1px solid ${C.border}` }
    : { background: hov ? '#ffffff08' : 'transparent', color: C.textMuted, border: `1px solid ${C.border}` };
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ ...base, borderRadius: 8, padding: '7px 14px', fontSize: 12, fontWeight: 500, transition: 'all .15s', display: 'flex', alignItems: 'center', gap: 5, ...style }}>
      {children}
    </button>
  );
}

function Badge({ label, color }) {
  return (
    <span style={{ background: color + '20', color, border: `1px solid ${color}40`, fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 10, whiteSpace: 'nowrap' }}>
      {label}
    </span>
  );
}

function ScoreBar({ pct }) {
  const color = pct >= 75 ? C.cyan : pct >= 50 ? C.amber : C.red;
  return (
    <div>
      <div style={{ height: 4, background: C.border, borderRadius: 2, width: 80, marginBottom: 3 }}>
        <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 2, transition: 'width .6s ease' }} />
      </div>
      <span style={{ fontSize: 10, color: C.textMuted }}>{pct}%</span>
    </div>
  );
}

function Sparkline({ data, color, width = 72, height = 28 }) {
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * (height - 4) - 2}`).join(' ');
  const area = `M0,${height} L${pts.split(' ').join(' L')} L${width},${height} Z`;
  const id = `sg${color.replace('#', '')}`;
  return (
    <svg width={width} height={height} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

function RingProgress({ value, size = 52, color = C.blue }) {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth="4" />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
        strokeDasharray={circ} strokeDashoffset={circ - (value / 100) * circ}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: 'stroke-dashoffset .8s ease' }} />
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
        fill={C.text} fontSize="11" fontWeight="700">{value}%</text>
    </svg>
  );
}

// ─── OVERVIEW TAB ─────────────────────────────────────────

function MiniBarChart({ data, colors }) {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', height: 80, padding: '0 4px' }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <span style={{ fontSize: 11, color: C.textMuted, fontWeight: 600 }}>{d.value}</span>
          <div style={{ width: '100%', background: C.border, borderRadius: 4, height: 48, display: 'flex', alignItems: 'flex-end' }}>
            <div style={{ width: '100%', height: `${(d.value / max) * 100 || 6}%`, minHeight: 4, background: colors[i], borderRadius: 4, transition: 'height .6s ease' }} />
          </div>
          <span style={{ fontSize: 10, color: C.textDim }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

function ActivityHeatmap() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hours = ['8am','10am','12pm','2pm','4pm','6pm'];
  const data = [[0,2,5,8,6,1],[1,4,9,10,7,2],[0,3,7,9,8,3],[2,5,8,11,6,1],[1,4,6,8,5,0],[0,1,2,3,2,0],[0,0,1,2,1,0]];
  const max = Math.max(...data.flat());
  return (
    <div>
      <div style={{ display: 'flex', gap: 2, marginBottom: 4 }}>
        <div style={{ width: 28 }} />
        {hours.map(h => <div key={h} style={{ flex: 1, fontSize: 9, color: C.textDim, textAlign: 'center' }}>{h}</div>)}
      </div>
      {data.map((row, di) => (
        <div key={di} style={{ display: 'flex', gap: 2, marginBottom: 2, alignItems: 'center' }}>
          <div style={{ width: 28, fontSize: 10, color: C.textMuted }}>{days[di]}</div>
          {row.map((v, hi) => {
            const t = max ? v / max : 0;
            const bg = t === 0 ? C.borderLight : t < 0.3 ? '#1d3a5f' : t < 0.6 ? '#1e4d8c' : t < 0.85 ? '#2563eb' : '#3b82f6';
            return <div key={hi} style={{ flex: 1, height: 14, borderRadius: 2, background: bg }} />;
          })}
        </div>
      ))}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 10 }}>
        <span style={{ fontSize: 10, color: C.textDim }}>Less</span>
        {['#21262d','#1d3a5f','#1e4d8c','#2563eb','#3b82f6'].map((c, i) => <div key={i} style={{ width: 10, height: 10, background: c, borderRadius: 2 }} />)}
        <span style={{ fontSize: 10, color: C.textDim }}>More</span>
      </div>
    </div>
  );
}

function StatCard({ icon, label, value, sub, spark, sparkColor, trend, trendUp, color = C.cyan, alert }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: hov ? C.surface2 : C.surface, border: `1px solid ${alert ? C.amber + '60' : C.border}`, borderRadius: 12, padding: '18px 20px 14px', display: 'flex', flexDirection: 'column', gap: 8, transition: 'all .2s', boxShadow: alert ? `0 0 0 1px ${C.amber}30` : 'none' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div style={{ fontSize: 22 }}>{icon}</div>
        {trend && <span style={{ fontSize: 11, fontWeight: 600, color: trendUp ? C.green : C.red, background: (trendUp ? C.green : C.red) + '18', padding: '2px 7px', borderRadius: 20 }}>{trendUp ? '↑' : '↓'} {trend}</span>}
      </div>
      <div style={{ fontSize: 32, fontWeight: 800, color, lineHeight: 1, letterSpacing: '-1px' }}>{value}</div>
      <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>{label}</div>
      {spark && <Sparkline data={spark} color={sparkColor || color} />}
      {sub && <div style={{ fontSize: 11, color: C.textDim, marginTop: -4 }}>{sub}</div>}
    </div>
  );
}

      </div>
    </div>
  );
}

// ─── SIDEBAR NAV ──────────────────────────────────────────

function NavItem({ icon, label, active, badge, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 12px', borderRadius:8, cursor:'pointer', background:active?'#3b82f618':hov?'#ffffff08':'transparent', color:active?C.blue:hov?C.text:C.textMuted, borderLeft:`2px solid ${active?C.blue:'transparent'}`, transition:'all .15s', marginBottom:2 }}>
      <span style={{ fontSize:16 }}>{icon}</span>
      <span style={{ fontSize:13, fontWeight:active?600:400, flex:1 }}>{label}</span>
      {badge && <span style={{ background:C.red, color:'#fff', fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:10 }}>{badge}</span>}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────

function App() {
  const [nav, setNav] = useState('overview');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const tabs = [
    { id:'overview', icon:'⬛', label:'Overview' },
    { id:'students', icon:'👥', label:'Students' },
    { id:'assignments', icon:'📋', label:'Assignments' },
    { id:'activity', icon:'📊', label:'Activity' },
    { id:'admin', icon:'👑', label:'Admin' },
  ];

  return (
    <div style={{ display:'flex', height:'100vh', background:C.bg, overflow:'hidden' }}>
      {/* Sidebar */}
      <div style={{ width:200, flexShrink:0, background:C.surface, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', padding:'20px 12px', gap:2 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 4px 20px' }}>
          <div style={{ width:32, height:32, borderRadius:8, background:'linear-gradient(135deg,#3b82f6,#6366f1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>📘</div>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:C.text }}>Teacher's</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:-2 }}>Dashboard</div>
          </div>
        </div>
        <div style={{ fontSize:9, fontWeight:700, color:C.textDim, letterSpacing:'1px', padding:'0 12px 6px', textTransform:'uppercase' }}>Main</div>
        {tabs.map(t => <NavItem key={t.id} icon={t.icon} label={t.label} active={nav===t.id} badge={t.id==='activity'?'44':null} onClick={() => setNav(t.id)} />)}
        <div style={{ flex:1 }} />
        <div style={{ fontSize:9, fontWeight:700, color:C.textDim, letterSpacing:'1px', padding:'0 12px 6px', textTransform:'uppercase' }}>Account</div>
        <NavItem icon="⚙️" label="Settings" onClick={() => {}} />
        <NavItem icon="🚪" label="Logout" onClick={() => {}} />
        <div style={{ borderTop:`1px solid ${C.border}`, marginTop:12, paddingTop:12, display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:32, height:32, borderRadius:'50%', background:'linear-gradient(135deg,#6366f1,#a855f7)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700 }}>JD</div>
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:C.text }}>Jane Doe</div>
            <div style={{ fontSize:10, color:C.textMuted }}>Educator</div>
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex:1, overflow:'auto', padding:'24px 28px', display:'flex', flexDirection:'column', gap:20 }}>
        {/* Header */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexShrink:0 }}>
          <div>
            <h1 style={{ fontSize:20, fontWeight:800, color:C.text, letterSpacing:'-0.5px' }}>
              {nav==='overview' && 'Good morning, Jane 👋'}
              {nav==='students' && '👥 Students'}
              {nav==='assignments' && '📋 Assignments'}
              {nav==='activity' && '📊 Activity'}
              {nav==='admin' && '👑 Admin'}
            </h1>
            <p style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>
              {nav==='overview' ? <span>Friday, April 25 · <span style={{ color:C.amber }}>5 students need your attention</span></span>
               : nav==='students' ? 'Monitor and manage your student roster'
               : nav==='assignments' ? 'Manage and track student assignments'
               : nav==='activity' ? 'View recent session and practice activity'
               : 'Manage teacher accounts and class assignments'}
            </p>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {nav==='overview' && (
              <>
                <select style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.textMuted, borderRadius:8, padding:'7px 12px', fontSize:12 }}>
                  <option>Last 7 days</option><option>Last 30 days</option><option>This semester</option>
                </select>
                <Btn variant="solid">+ New Assignment</Btn>
              </>
            )}
          </div>
        </div>

        {/* Tab content */}
        <div style={{ flex:1 }}>
          {nav==='overview' && <OverviewTab />}
          {nav==='students' && <StudentsTab />}
          {nav==='assignments' && <AssignmentsTab />}
          {nav==='activity' && <ActivityTab />}
          {nav==='admin' && <AdminTab />}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection title="Accent">
          <TweakColor id="accentColor" label="Accent Color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakToggle id="compactMode" label="Compact Mode" value={tweaks.compactMode} onChange={v => setTweak('compactMode', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
