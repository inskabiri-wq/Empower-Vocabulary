<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hub preview — real CSS + real hub.js</title>
<link rel="stylesheet" href="../../student/css/styles.css" />
<link rel="stylesheet" href="../../student/css/extra.css" />
<link rel="stylesheet" href="../../student/css/hub.css" />
<style>
  body { background: #0b1220; margin: 0; display: block !important; }
  .screen { display: none; width: 100%; }
  .screen.active { display: block; }
  .container { padding: 24px 16px; max-width: 1100px; margin: 0 auto; }
  .preview-note {
    max-width: 1100px;
    margin: 0 auto 16px;
    padding: 10px 14px;
    background: rgba(251, 191, 36, 0.08);
    border: 1px solid rgba(251, 191, 36, 0.25);
    color: #fcd34d;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="preview-note">🧪 Preview of #hubScreen with real styles + real hub.js. Auth-free.</div>

<div class="container">
  <div id="hubScreen" class="screen active">

    <div class="dashboard-header">
      <div class="header-left">
        <h1>
          <svg class="dash-icon-svg" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="capGradHub" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#fb923c"/>
              </linearGradient>
            </defs>
            <polygon points="14,3 27,10 14,17 1,10" fill="url(#capGradHub)"/>
            <path d="M7 12.5v6a7 7 0 0 0 14 0v-6" fill="url(#capGradHub)" opacity="0.75"/>
            <line x1="27" y1="10" x2="27" y2="19" stroke="url(#capGradHub)" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="27" cy="21.5" r="2.5" fill="#f59e0b"/>
          </svg>
          FSM Language Trainer
        </h1>
        <p class="subtitle">Pick a skill to practice today</p>
      </div>
      <div class="header-right">
        <button class="header-icon-btn" title="Settings"><span>⚙️</span></button>
        <button class="profile-badge">
          <div class="avatar-display" style="background:#fff3e0">
            <span class="avatar-emoji">🦊</span>
          </div>
          <div class="profile-info">
            <span class="profile-name">Student</span>
            <span class="profile-level">Level <span>1</span> • <span>0</span> XP</span>
          </div>
        </button>
        <button class="logout-btn"><span>🚪</span><span>Logout</span></button>
      </div>
    </div>

    <div class="hub-section-lbl">Skills</div>
    <div class="hub-grid" id="hubGrid"><!-- populated by hub.js --></div>
  </div>
</div>

<!-- Stub globals so hub.js doesn't error -->
<script>
  function showScreen(id) { console.log('[preview] showScreen:', id); }
  // hub.js reads journeyStats written by progress.js in the real app
  window.journeyStats = { averageScore: 43, totalWordsLearned: 881 };
</script>
<script src="../../student/js/hub.js"></script>
</body>
</html>
